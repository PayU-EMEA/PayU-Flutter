name: payu_web_payments
description: Flutter package which allows to make Web payments via Payu
version: 1.2.1
publish_to: none
homepage: https://github.com/PayU-EMEA/PayU-Flutter
issue_tracker: https://github.com/PayU-EMEA/PayU-Flutter/issues
environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=3.32.0"
dependencies:
  flutter:
    sdk: flutter
  payu_api:
    git:
      url: https://github.com/PayU-EMEA/PayU-Flutter.git
      path: payu_api
      ref: 1.2.1
  payu_core:
    git:
      url: https://github.com/PayU-EMEA/PayU-Flutter.git
      path: payu_core
      ref: 1.2.1
  payu_state_management:
    git:
      url: https://github.com/PayU-EMEA/PayU-Flutter.git
      path: payu_state_management
      ref: 1.2.1
  payu_translations:
    git:
      url: https://github.com/PayU-EMEA/PayU-Flutter.git
      path: payu_translations
      ref: 1.2.1
  payu_ui:
    git:
      url: https://github.com/PayU-EMEA/PayU-Flutter.git
      path: payu_ui
      ref: 1.2.1
  webview_flutter: ^4.13.0
  webview_flutter_wkwebview: any
dev_dependencies:
  build_runner: ^2.5.0
  dependency_validator: ^5.0.5
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  http: ^1.6.0
  mockito: ^5.5.0
  webview_flutter_platform_interface: any
