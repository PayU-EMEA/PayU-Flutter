name: payu_payment_methods
description: Flutter package which allows to present available POS payment methods easy
version: 1.2.0
publish_to: none
homepage: https://github.com/PayU-EMEA/PayU-Flutter
issue_tracker: https://github.com/PayU-EMEA/PayU-Flutter/issues
environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=3.32.0"
dependencies:
  collection: ^1.18.0
  flutter:
    sdk: flutter
  payu_add_card:
    git:
      url: https://github.com/PayU-EMEA/PayU-Flutter.git
      path: payu_add_card
      ref: 1.2.0
  payu_core:
    git:
      url: https://github.com/PayU-EMEA/PayU-Flutter.git
      path: payu_core
      ref: 1.2.0
  payu_state_management:
    git:
      url: https://github.com/PayU-EMEA/PayU-Flutter.git
      path: payu_state_management
      ref: 1.2.0
  payu_translations:
    git:
      url: https://github.com/PayU-EMEA/PayU-Flutter.git
      path: payu_translations
      ref: 1.2.0
  payu_ui:
    git:
      url: https://github.com/PayU-EMEA/PayU-Flutter.git
      path: payu_ui
      ref: 1.2.0
dev_dependencies:
  build_runner: ^2.5.0
  dependency_validator: ^5.0.5
  flutter_lints: ^6.0.0
