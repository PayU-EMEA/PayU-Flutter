name: payu_api
description: Flutter package with Payu networking mechanism.
version: 1.2.2
publish_to: none
homepage: https://github.com/PayU-EMEA/PayU-Flutter
issue_tracker: https://github.com/PayU-EMEA/PayU-Flutter/issues
environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=3.32.0"
dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  payu_core:
    git:
      url: https://github.com/PayU-EMEA/PayU-Flutter.git
      path: payu_core
      ref: 1.2.2
dev_dependencies:
  build_runner: ^2.5.0
  dependency_validator: ^5.0.5
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
flutter:
  assets:
    - ssl/payu-root-ca-01.pem
    - ssl/digicert-global-root-g2.pem
    - ssl/digicert-global-root-g3.pem
    - ssl/sectigoR46.pem
